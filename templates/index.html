<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Portal | LAIKIPIA CU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="glass-container">
        <div class="header">
           <img src="{{ url_for('static', filename='logo.png') }}" alt="LUCU Logo" class="cu-logo">
            <h1>LUCU CLASS OF 2025/2026</h1>
            <p>Enter your details to generate your certificate</p>
        </div>

        <form action="/generate" method="POST" class="cert-form" id="mainForm">
            <div class="input-group">
                <label for="student_name">Recipient Name</label>
                <div class="inner-input">
                    <i class="fas fa-user"></i>
                    <input type="text" id="student_name" name="student_name" placeholder="Full Name" required>
                </div>
            </div>

            <button type="submit" class="btn-generate">
                <span>Preview Certificate</span>
                <i class="fas fa-eye"></i>
            </button>
        </form>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> Confirm Details</h3>
            </div>
            <div class="preview-body">
                <div class="preview-item">
                    <small>Full Name:</small>
                    <p id="previewName"></p>
                </div>
                
                <p class="notice">Please ensure the spelling is correct. Changes cannot be made after generation.</p>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="closePreview()" class="btn-secondary">
                    <i class="fas fa-edit"></i> Edit
                </button>
                <button type="button" onclick="submitFinal()" class="btn-confirm">
                    Download Certificate <i class="fas fa-download"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
